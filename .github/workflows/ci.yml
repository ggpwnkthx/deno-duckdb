name: CI
on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v1
        with:
          deno-version: 2.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check ./src/*

      - name: Coverage check
        run: deno task coverage:check

      - name: Run tests
        run: deno test -A ./tests/*

      - name: Run examples
        run: deno task examples
